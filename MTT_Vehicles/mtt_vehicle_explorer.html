<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTT Vehicle Explorer</title>
    <link rel="stylesheet" href="../BarkEngine36/styles/styles.css">
    <style>
        /* Ensuring the images stay the size you requested */
        .vehicle-img {
            width: 150px;
            height: auto;
            border-radius: 4px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

    <center>
        <img src="../BarkEngine36/mtttext1.png">
        <p>Made With the BarkEngine (v0.36!)</p>
        <hr>

        <h2>MTT Vehicle Explorer</h2>
        <br>
        <strong>Vehicles:</strong>
        <table id="vehicle-table">
            <thead>
                <tr>
                    <th>Image</th> <th>Vehicle Name</th>
                    <th>Price</th>
                    <th>Type</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="vehicle-body">
                </tbody>
        </table>

        <footer>
            <p>Copyright WoofWorks Inc 2026</p>
        </footer>
    </center>

    <script>
        async function loadVehicles() {
            try {
                const response = await fetch('vehicles.csv');
                const data = await response.text();

                const rows = data.split('\n').slice(1);
                const tableBody = document.getElementById('vehicle-body');

                rows.forEach(row => {
                    if (row.trim() === "") return;

                    // 1. Split the row (Name, Price, Type, Image)
                    const [name, price, type, imageName] = row.split(',');

                    // 2. Create the row
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <img src="vehicle_images/${imageName.trim()}" 
                                 alt="${name}" 
                                 class="vehicle-img">
                        </td>
                        <td>${name}</td>
                        <td>${price}</td>
                        <td>${type}</td>
                        <td>
                            <button>Purchase</button>
                            <button>Sell</button>
                            <button>Lease</button>
                            <button>Details</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error("Error loading CSV:", error);
            }
        }

        window.onload = loadVehicles;
    </script>
</body>
</html>
